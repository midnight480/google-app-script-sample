<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backlog Webhook Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .fade-enter { opacity: 0; transform: translateY(10px); }
    .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease-out; }
    [x-cloak] { display: none !important; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col" x-data="appData()" x-init="init()">
  
  <header class="bg-gradient-to-r from-brand-600 to-brand-900 text-white shadow-lg py-6 px-8 relative overflow-hidden">
    <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
    <div class="max-w-6xl mx-auto relative z-10 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Backlog Webhook Viewer</h1>
        <p class="text-brand-100 text-sm mt-1">リアルタイムでWebhookの生データとGitイベントを確認</p>
      </div>
      <!-- Refresh Button -->
      <button @click="refreshData()" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 transition-colors px-4 py-2 rounded-full text-sm font-medium backdrop-blur-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="{'animate-spin': loading}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        更新
      </button>
    </div>
  </header>

  <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
    
    <!-- Tabs -->
    <div class="flex space-x-1 bg-gray-200/50 p-1 rounded-xl mb-6 glass w-max">
      <button @click="activeTab = 'raw'" :class="activeTab === 'raw' ? 'bg-white text-brand-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'" class="px-6 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200">
        All Webhooks (Raw Data)
      </button>
      <button @click="activeTab = 'git'" :class="activeTab === 'git' ? 'bg-white text-brand-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'" class="px-6 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200">
        Git Webhooks
      </button>
    </div>

    <!-- Content Area -->
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden relative min-h-[400px]">
      
      <!-- Loading Overlay -->
      <div x-show="loading" x-transition.opacity class="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-600"></div>
      </div>

      <!-- Raw Data Tab -->
      <div x-show="activeTab === 'raw'" x-transition:enter="fade-enter-active" x-transition:enter-start="fade-enter" class="w-full">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                <th class="px-6 py-4 font-medium">受信日時</th>
                <th class="px-6 py-4 font-medium">イベント判定 (Type)</th>
                <th class="px-6 py-4 font-medium">生データ(プレビュー)</th>
                <th class="px-6 py-4 font-medium text-right">アクション</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <template x-for="(log, index) in rawLogs" :key="index">
                <tr class="hover:bg-brand-50/50 transition-colors group">
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 font-medium" x-text="log[0]"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800" x-text="extractType(log[1])"></span>
                  </td>
                  <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate font-mono text-xs" x-text="log[1]"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <button @click="viewPayload(log[1])" class="text-brand-600 hover:text-brand-900 bg-brand-50 hover:bg-brand-100 px-3 py-1.5 rounded-md transition-colors">
                      詳細を見る
                    </button>
                  </td>
                </tr>
              </template>
              <tr x-show="rawLogs.length === 0 && !loading"><td colspan="4" class="px-6 py-12 text-center text-gray-500">データがありません</td></tr>
            </tbody>
          </table>
        </div>
        
        <!-- Pagination -->
        <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex items-center justify-between" x-show="rawTotalPages > 0">
          <span class="text-sm text-gray-500">Page <span class="font-medium text-gray-900" x-text="rawPage"></span> of <span class="font-medium text-gray-900" x-text="rawTotalPages"></span></span>
          <div class="flex space-x-2">
            <button @click="prevRawPage()" :disabled="rawPage <= 1" class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Previous</button>
            <button @click="nextRawPage()" :disabled="rawPage >= rawTotalPages" class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Next</button>
          </div>
        </div>
      </div>

      <!-- Git Webhooks Tab -->
      <div x-show="activeTab === 'git'" x-cloak x-transition:enter="fade-enter-active" x-transition:enter-start="fade-enter" class="w-full">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                <th class="px-6 py-4 font-medium">受信日時</th>
                <th class="px-6 py-4 font-medium">リポジトリ</th>
                <th class="px-6 py-4 font-medium">イベントタイプ</th>
                <th class="px-6 py-4 font-medium">ブランチ/タグ</th>
                <th class="px-6 py-4 font-medium">コミット数</th>
                <th class="px-6 py-4 font-medium">プッシュしたユーザー</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <template x-for="(log, index) in gitLogs" :key="index">
                <tr class="hover:bg-brand-50/50 transition-colors">
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 font-medium" x-text="log[0]"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900" x-text="log[1]"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800" x-text="log[2] == 12 ? 'Git Push' : log[2]"></span>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                    <span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs font-mono" x-text="log[3]"></span>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="log[4]"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-xs font-bold" x-text="log[5].charAt(0).toUpperCase()"></div>
                    <span x-text="log[5]"></span>
                  </td>
                </tr>
              </template>
              <tr x-show="gitLogs.length === 0 && !loading"><td colspan="6" class="px-6 py-12 text-center text-gray-500">データがありません</td></tr>
            </tbody>
          </table>
        </div>
        
        <!-- Pagination -->
        <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex items-center justify-between" x-show="gitTotalPages > 0">
          <span class="text-sm text-gray-500">Page <span class="font-medium text-gray-900" x-text="gitPage"></span> of <span class="font-medium text-gray-900" x-text="gitTotalPages"></span></span>
          <div class="flex space-x-2">
            <button @click="prevGitPage()" :disabled="gitPage <= 1" class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Previous</button>
            <button @click="nextGitPage()" :disabled="gitPage >= gitTotalPages" class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Next</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal for Payload details -->
  <div x-show="showModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
      
      <div x-show="showModal" x-transition.opacity class="fixed inset-0 bg-gray-900/75 backdrop-blur-sm transition-opacity" @click="showModal = false" aria-hidden="true"></div>

      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
      
      <div x-show="showModal" 
           x-transition:enter="ease-out duration-300" 
           x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
           x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" 
           x-transition:leave="ease-in duration-200" 
           x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" 
           x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
           class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl w-full">
        
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 border-b border-gray-100 flex justify-between items-center">
          <h3 class="text-lg leading-6 font-semibold text-gray-900" id="modal-title">Payload 詳細</h3>
          <button @click="showModal = false" class="text-gray-400 hover:text-gray-500 focus:outline-none bg-gray-100 hover:bg-gray-200 p-2 rounded-full transition-colors">
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="bg-gray-50 px-4 py-4 sm:p-6">
          <div class="mt-2">
            <pre class="text-sm text-gray-800 bg-white p-4 rounded-xl border border-gray-200 overflow-x-auto max-h-[60vh] font-mono shadow-inner" x-text="selectedPayload"></pre>
          </div>
        </div>
        <div class="bg-white px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-100">
          <button type="button" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm transition-colors" @click="showModal = false">
            閉じる
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function appData() {
      return {
        activeTab: 'raw',
        rawLogs: [],
        gitLogs: [],
        rawPage: 1,
        gitPage: 1,
        rawTotalPages: 0,
        gitTotalPages: 0,
        loading: false,
        selectedPayload: null,
        showModal: false,
        
        init() {
          this.fetchRawLogs();
          this.fetchGitLogs();
        },

        refreshData() {
          if(this.activeTab === 'raw') {
            this.fetchRawLogs();
          } else {
            this.fetchGitLogs();
          }
        },
        
        extractType(rawData) {
          try {
            const data = JSON.parse(rawData);
            return 'Type: ' + (data.type || 'Unknown');
          } catch(e) {
            return 'Error';
          }
        },
        
        fetchRawLogs() {
          this.loading = true;
          // GASのgoogle.script.runが使える環境かどうかチェック（ローカル開発用モック対策）
          if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler((res) => {
                this.rawLogs = res.data;
                this.rawTotalPages = res.totalPages;
                this.rawPage = res.currentPage;
                this.loading = false;
              })
              .withFailureHandler((err) => {
                console.error(err);
                this.loading = false;
                alert('データの取得に失敗しました');
              })
              .getRawData(this.rawPage, 20);
          } else {
            // モックデータ（ローカル確認用）
            setTimeout(() => {
              this.rawLogs = [
                ['2024-01-01 12:00:00', '{"type":1,"project":{"name":"Test"}}'],
                ['2024-01-01 11:00:00', '{"type":12,"repository":{"name":"GitRepo"}}']
              ];
              this.rawTotalPages = 1;
              this.loading = false;
            }, 500);
          }
        },
        
        fetchGitLogs() {
          this.loading = true;
          if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler((res) => {
                this.gitLogs = res.data;
                this.gitTotalPages = res.totalPages;
                this.gitPage = res.currentPage;
                this.loading = false;
              })
              .withFailureHandler((err) => {
                console.error(err);
                this.loading = false;
              })
              .getGitWebhookLogs(this.gitPage, 20);
          } else {
            setTimeout(() => {
              this.gitLogs = [
                ['2024-01-01 11:00:00', 'GitRepo', 12, 'refs/heads/main', 3, 'Tetsuya']
              ];
              this.gitTotalPages = 1;
              this.loading = false;
            }, 500);
          }
        },
        
        nextRawPage() {
          if (this.rawPage < this.rawTotalPages) {
            this.rawPage++;
            this.fetchRawLogs();
          }
        },
        
        prevRawPage() {
          if (this.rawPage > 1) {
            this.rawPage--;
            this.fetchRawLogs();
          }
        },
        
        nextGitPage() {
          if (this.gitPage < this.gitTotalPages) {
            this.gitPage++;
            this.fetchGitLogs();
          }
        },
        
        prevGitPage() {
          if (this.gitPage > 1) {
            this.gitPage--;
            this.fetchGitLogs();
          }
        },
        
        viewPayload(data) {
          try {
            const parsed = typeof data === 'string' ? JSON.parse(data) : data;
            this.selectedPayload = JSON.stringify(parsed, null, 2);
          } catch (e) {
            this.selectedPayload = data;
          }
          this.showModal = true;
        }
      }
    }
  </script>
</body>
</html>
